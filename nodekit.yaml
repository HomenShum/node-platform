schemaVersion: nodekit.repo/v1
repository: HomenShum/node-platform
lifecycle: preview
support: active
role: platform
commandProfile: platform

canonicalFor:
  - nodeplatform.repo-contract
  - nodeplatform.change-story
  - nodekit.knowledge-evolution

consumes:
  - betterprhandoff.handoff
  - betterprhandoff.nodekit-present-receipt
  - featureclip.evidence-manifest
  - featureclip.evidence-receipt
  - nodetasks.corpus-receipt
  - nodeslide.deck
  - nodeslide.deck-patch

commands:
  doctor:
    script: doctor
    mode: finite
  check:
    script: check
    mode: finite

noKey:
  status: not-applicable
  command: null
  externalAccountsRequired: 0
  disclosure: NodeKit is deterministic repository tooling and does not call a model.

environment:
  contractVersion: nodeplatform.env/v1
  status: aligned

proof:
  command: npm run check
  receiptSchema: nodeplatform.conformance/v1

contractDeclarations:
  - concept: nodekit.knowledge-evolution
    signature: knowledge-graph-schema
    path: src/lib/knowledge-evolution.mjs
    mode: canonical
architectureExceptions: []
