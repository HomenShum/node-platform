name: Node Platform conformance

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version used for NodeKit.
        required: false
        type: string
        default: "22"
      platform_ref:
        description: Immutable node-platform ref during coordinated migrations.
        required: false
        type: string
        default: main

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Checkout Node Platform
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: HomenShum/node-platform
          ref: ${{ inputs.platform_ref }}
          path: .node-platform
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: .node-platform/package-lock.json
      - name: Install NodeKit
        run: npm ci --prefix .node-platform
      - name: Check repository contract
        run: node .node-platform/src/cli.mjs repo check --repo-root . --registry-root .node-platform
