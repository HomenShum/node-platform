name: ecosystem conformance

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * 1"

jobs:
  ecosystem:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Checkout active repositories
        shell: bash
        run: |
          mkdir -p ../ecosystem
          for repo in NodeAgent NodeRoom NodeSlide NodeVideo NodeVoice NodeTrace NodeMem NodeProof agentic-ui-qa; do
            git clone --depth 1 "https://github.com/HomenShum/${repo}.git" "../ecosystem/${repo}"
          done
      - name: Verify ecosystem
        run: node src/cli.mjs ecosystem check --registry-root . --workspace ../ecosystem
