name: NodeKit EaseProof

on:
  pull_request:
  workflow_dispatch:
    inputs:
      cache_class:
        description: Evidence label; use cold only on a genuinely clean runner.
        required: true
        default: cold
        type: choice
        options: [cold, warm]
      paired_cold_run_id:
        description: Required for warm evidence; the successful cold run ID for this exact frozen commit.
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  evidence-contract:
    name: Hosted evidence contract
    runs-on: ubuntu-latest
    steps:
      - name: Validate cold/warm dispatch pairing
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          CACHE_CLASS: ${{ inputs.cache_class }}
          COLD_RUN_ID: ${{ inputs.paired_cold_run_id }}
          EXPECTED_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$CACHE_CLASS" == "cold" ]]; then
            if [[ -n "$COLD_RUN_ID" ]]; then
              echo "paired_cold_run_id must be empty for the cold dispatch" >&2
              exit 1
            fi
            exit 0
          fi
          if ! [[ "$COLD_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "warm evidence requires a numeric paired_cold_run_id" >&2
            exit 1
          fi
          if [[ "$COLD_RUN_ID" == "$GITHUB_RUN_ID" ]]; then
            echo "cold and warm evidence must use distinct workflow runs" >&2
            exit 1
          fi
          mapfile -t cold_run < <(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$COLD_RUN_ID" --jq '.path,.event,.head_sha,.status,.conclusion')
          [[ "${cold_run[0]}" == ".github/workflows/ease-proof.yml" ]] || { echo "paired run used a different workflow" >&2; exit 1; }
          [[ "${cold_run[1]}" == "workflow_dispatch" ]] || { echo "paired run was not a deliberate workflow dispatch" >&2; exit 1; }
          [[ "${cold_run[2]}" == "$EXPECTED_SHA" ]] || { echo "paired cold run used a different commit" >&2; exit 1; }
          [[ "${cold_run[3]}" == "completed" && "${cold_run[4]}" == "success" ]] || { echo "paired cold run is not completed successfully" >&2; exit 1; }

  developer-ease:
    name: ${{ inputs.cache_class || 'smoke' }} / ${{ matrix.os }} / ${{ matrix.package_manager }} / trial ${{ matrix.trial }}
    needs: evidence-contract
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        package_manager: [npm, pnpm]
        # Pull requests get one smoke trial per lane. Deliberate evidence
        # dispatches get five isolated runners per lane, so one cold dispatch
        # plus one warm dispatch yields the exact 60-receipt matrix.
        trial: ${{ fromJSON(github.event_name == 'workflow_dispatch' && '[1,2,3,4,5]' || '[1]') }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        if: matrix.package_manager == 'pnpm'
        with:
          version: 10
      - run: npm ci
      - name: Run fresh generated-candidate journey
        run: npm run acceptance:factory
        env:
          NODEKIT_CACHE_CLASS: ${{ inputs.cache_class || 'warm-or-unknown' }}
          NODEKIT_EASE_RUN_ID: ease_${{ github.run_id }}_${{ github.run_attempt }}_${{ matrix.os }}_${{ matrix.package_manager }}_${{ matrix.trial }}_${{ inputs.cache_class || 'smoke' }}
          NODEKIT_PACKAGE_MANAGER: ${{ matrix.package_manager }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: github.event_name == 'workflow_dispatch' && success()
        with:
          name: developer-timing-${{ matrix.os }}-${{ matrix.package_manager }}-${{ matrix.trial }}-${{ inputs.cache_class }}
          if-no-files-found: error
          path: proof/ease/developer-timing-run.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: ease-proof-${{ matrix.os }}-${{ matrix.package_manager }}-${{ matrix.trial }}-${{ inputs.cache_class || 'smoke' }}
          if-no-files-found: error
          path: |
            proof/factory-acceptance.json
            proof/ease/developer-timing-run.json
            proof/ease/latest/**

  aggregate-developer-evidence:
    name: Aggregate exact cold/warm matrix
    if: github.event_name == 'workflow_dispatch' && inputs.cache_class == 'warm' && needs.developer-ease.result == 'success'
    needs: developer-ease
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download the paired cold receipts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.paired_cold_run_id }}
          pattern: developer-timing-*
          merge-multiple: false
          path: proof/ease/hosted/cold
      - name: Download this warm run's receipts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          pattern: developer-timing-*
          merge-multiple: false
          path: proof/ease/hosted/warm
      - name: Build the fail-closed 60-run verdict
        run: >-
          npm run ease:aggregate-developer --
          proof/ease/hosted
          proof/ease/developer-timing-runs.json
          proof/ease/developer-timing-verdict.json
          --cold-run-id=${{ inputs.paired_cold_run_id }}
          --warm-run-id=${{ github.run_id }}
          --expected-commit=${{ github.sha }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: developer-timing-verdict-${{ github.sha }}
          if-no-files-found: error
          path: |
            proof/ease/developer-timing-runs.json
            proof/ease/developer-timing-verdict.json
