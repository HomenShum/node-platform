name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run audit:prod
      - run: npm run registry:check
      - name: Pack and install NodeKit
        shell: bash
        run: |
          package_dir="$RUNNER_TEMP/nodekit-package"
          install_dir="$RUNNER_TEMP/nodekit-install"
          mkdir -p "$package_dir" "$install_dir"
          npm pack --pack-destination "$package_dir"
          npm install --ignore-scripts --prefix "$install_dir" "$package_dir"/*.tgz
          "$install_dir/node_modules/.bin/nodekit" registry check
          "$install_dir/node_modules/.bin/nodekit" doctor --repo-root "$GITHUB_WORKSPACE"
