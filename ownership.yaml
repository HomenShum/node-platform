schemaVersion: nodeplatform.ownership/v1

concepts:
  nodeplatform.repo-contract:
    owner: node-platform
    package: "@homenshum/nodekit"
    targetPackage: "@homenshum/nodekit"
    status: canonical
    contractVersion: nodekit.repo/v1
    consumers:
      - NodeAgent
      - NodeRoom
      - NodeSlide
      - NodeVideo
      - NodeVoice
      - NodeTrace
      - NodeMem
      - NodeProof
      - agentic-ui-qa
      - NodeTasks
      - BetterPRHandoff
      - FeatureClipStudio

  nodeplatform.change-story:
    owner: node-platform
    package: "@homenshum/nodekit"
    targetPackage: "@homenshum/nodekit"
    status: canonical
    contractVersion: nodekit.change-story/v1
    consumers:
      - BetterPRHandoff
      - FeatureClipStudio

  featureclip.evidence-manifest:
    owner: FeatureClipStudio
    package: null
    targetPackage: null
    status: canonical-domain
    contractVersion: featureclip.evidence-manifest/v1
    consumers:
      - node-platform

  featureclip.evidence-receipt:
    owner: FeatureClipStudio
    package: null
    targetPackage: null
    status: canonical-domain
    contractVersion: featureclip.evidence-receipt/v1
    consumers:
      - node-platform

  betterprhandoff.handoff:
    owner: BetterPRHandoff
    package: "@homenshum/easier-to-read-submissions"
    targetPackage: "@homenshum/easier-to-read-submissions"
    status: canonical
    contractVersion: betterprhandoff.handoff/v1
    consumers:
      - node-platform

  betterprhandoff.nodekit-present-receipt:
    owner: BetterPRHandoff
    package: "@homenshum/easier-to-read-submissions"
    targetPackage: "@homenshum/easier-to-read-submissions"
    status: canonical
    contractVersion: betterprhandoff.nodekit-present-receipt/v1
    consumers:
      - node-platform

  nodetasks.corpus-receipt:
    owner: NodeTasks
    package: null
    targetPackage: null
    status: canonical-domain
    contractVersion: nodetasks.corpus-receipt/v1
    consumers:
      - node-platform

  nodeplatform.environment:
    owner: node-platform
    package: null
    targetPackage: "@nodeagent/config"
    status: planned
    contractVersion: nodeplatform.env/v1
    consumers:
      - NodeAgent
      - NodeRoom
      - NodeSlide
      - NodeVideo
      - NodeVoice

  nodeagent.agent-run:
    owner: NodeAgent
    package: "@homenshum/nodeagent"
    targetPackage: "@nodeagent/runtime"
    status: canonical-unpackaged
    contractVersion: nodeagent.run/v1
    consumers:
      - NodeRoom
      - NodeSlide
      - NodeVideo
      - NodeTasks
      - NodeVoice
      - NodeProof
    signatures:
      - id: agent-run-result
        regex: '^\s*export\s+(?:interface|type)\s+AgentRunResult\b'

  nodeagent.policy-context:
    owner: NodeAgent
    package: "@homenshum/nodeagent"
    targetPackage: "@nodeagent/runtime"
    status: canonical-unpackaged
    contractVersion: nodeagent.policy/v1
    consumers:
      - NodeBenchAI
      - NodeRoom
      - NodeSlide
      - NodeVideo
      - NodeVoice
    signatures:
      - id: policy-context
        regex: '^\s*export\s+(?:interface|type)\s+PolicyContext\b'

  nodeagent.proposal-review:
    owner: NodeAgent
    package: null
    targetPackage: "@nodeagent/proposal-protocol"
    status: planned
    contractVersion: nodeagent.proposal/v1
    consumers:
      - NodeRoom
      - NodeSlide
      - NodeVideo

  nodeagent.event-protocol:
    owner: NodeAgent
    package: "@homenshum/nodeagent"
    targetPackage: "@nodeagent/event-protocol"
    status: canonical-unpackaged
    contractVersion: nodeagent.event/v1
    consumers:
      - NodeTrace
      - NodeMem
    signatures:
      - id: nodeagent.event/v1
        regex: '^\s*export\s+const\s+NODEAGENT_EVENT_SCHEMA_VERSION\b'

  nodeagent.provider-pi:
    owner: NodeAgent
    package: "@homenshum/nodeagent"
    targetPackage: "@nodeagent/provider-pi"
    status: canonical-unpackaged
    contractVersion: nodeagent.provider-pi/v1
    consumers:
      - NodeRoom
      - NodeTasks
    signatures:
      - id: agent-model-adapter
        regex: '^\s*export\s+function\s+createPiAiAdapter\b'

  nodeagent.trace-workpaper:
    owner: NodeAgent
    package: null
    targetPackage: "@nodeagent/trace-protocol"
    status: migration-planned
    contractVersion: nodeagent.trace/v1
    currentSource:
      repository: NodeRoom
      path: src/nodeagent/traces/traceTypes.ts
    consumers:
      - NodeRoom
      - NodeSlide
      - NodeVideo
      - NodeTrace
      - NodeProof
      - NodeTasks
    signatures:
      - id: trace-schema
        regex: '^\s*export\s+const\s+NODEAGENT_TRACE_SCHEMA\b'
      - id: trace-tool-receipt
        regex: '^\s*export\s+(?:interface|type)\s+TraceToolReceipt\b'

  nodetrace.trace-ui-store:
    owner: NodeTrace
    package: "@homenshum/nodetrace"
    targetPackage: "@homenshum/nodetrace"
    status: canonical
    contractVersion: nodetrace.state/v1
    consumers:
      - NodeAgent
      - NodeRoom
      - NodeSlide
      - NodeVideo

  nodemem.memory:
    owner: NodeMem
    package: nodemem
    targetPackage: "@nodeagent/memory"
    status: canonical-unpackaged
    contractVersion: nodeagent.memory/v1
    consumers:
      - NodeRoom
      - NodeAgent

  proofloop.certification:
    owner: NodeProof
    package: proofloop
    targetPackage: proofloop
    status: canonical
    contractVersion: proofloop.receipt/v1
    consumers:
      - NodeAgent
      - NodeRoom
      - NodeSlide
      - NodeVideo
      - NodeVoice
      - NodeTrace
      - NodeMem
      - agentic-ui-qa

  agentic-ui-qa.flight-recorder:
    owner: agentic-ui-qa
    package: null
    targetPackage: "@nodeagent/ui-qa"
    status: canonical-unpackaged
    contractVersion: agentic-ui-qa.run/v1
    consumers:
      - NodeRoom
      - NodeSlide
      - NodeVideo

  noderoom.collaboration:
    owner: NodeRoom
    package: null
    targetPackage: null
    status: canonical-domain
    contractVersion: noderoom.room/v1
    consumers: []

  nodeslide.deck:
    owner: NodeSlide
    package: "@nodeslide/contracts"
    targetPackage: "@nodeslide/contracts"
    status: canonical-unpackaged
    contractVersion: nodeslide.slidelang/v1
    consumers:
      - node-platform
      - NodeRoom

  nodeslide.deck-patch:
    owner: NodeSlide
    package: "@nodeslide/contracts"
    targetPackage: "@nodeslide/contracts"
    status: canonical-unpackaged
    contractVersion: nodeslide.deck-patch/v1
    consumers:
      - node-platform
      - NodeRoom
    signatures:
      - id: nodeslide-patch-operation
        regex: '^\s*export\s+type\s+PatchOperation\b'

  nodevideo.worker-receipt:
    owner: NodeVideo
    package: null
    targetPackage: null
    status: canonical-domain
    contractVersion: nodevideo.worker-receipt.v1
    consumers: []

  nodevoice.room-state:
    owner: NodeVoice
    package: null
    targetPackage: null
    status: canonical-domain
    contractVersion: nodevoice.room-state/v1
    consumers: []
