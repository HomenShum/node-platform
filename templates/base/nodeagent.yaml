schemaVersion: nodeagent.application/v1
application:
  id: __APP_NAME__
  name: __APP_TITLE__
  purpose: __BRIEF_JSON__
authoring:
  directory: ./agent
runtime:
  engine: nodekit-caseflow
  profile: replay
provider:
  adapter: deterministic-fixture
  model:
    provider: local
    id: nodekit-guided-demo-v1
  secretRef: NODEKIT_OPTIONAL_MODEL_KEY
backend:
  adapter: memory
contracts:
  event: nodeagent.event/v1
  trace: nodeagent.trace/v1
orchestration:
  lifecycle: case-run-stage-artifact-proposal-approval-receipt
  oneAuthoritativeBackend: true
packs:
  - ./packs/primary/pack.yaml
policies:
  tools: deny-by-default
  proposalBeforeMutation: true
  preserveCanonicalStateOnFailure: true
  requireBaseVersion: true
  requireReceipt: true
evaluations:
  required:
    - figured-out-journey
    - stale-proposal-conflict
secrets:
  - envRef: NODEKIT_OPTIONAL_MODEL_KEY
